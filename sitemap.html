<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap Viewer</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; margin: 5px 0; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
        a { text-decoration: none; color: #0066cc; word-break: break-all; }
        a:hover { text-decoration: underline; }
        .error { color: #d9534f; background: #f2dede; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>Website Sitemap</h1>
    <div id="content">Loading sitemap...</div>

    <script>
        // Replace this with your actual sitemap URL
        const sitemapUrl = 'https://palash90.github.io/site-assets/sitemap.xml';

        async function loadSitemap() {
            const contentDiv = document.getElementById('content');
            
            try {
                const response = await fetch(sitemapUrl);
                if (!response.ok) throw new Error('Failed to fetch sitemap. Check CORS settings.');
                
                const text = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                
                // Find all <loc> tags in the XML
                const locations = xmlDoc.getElementsByTagName("loc");
                
                if (locations.length === 0) {
                    contentDiv.innerHTML = "No URLs found in the sitemap.";
                    return;
                }

                let htmlOutput = '<ul>';
                for (let i = 0; i < locations.length; i++) {
                    const url = locations[i].textContent;
                    htmlOutput += `<li><a href="${url}" target="_blank">${url}</a></li>`;
                }
                htmlOutput += '</ul>';
                
                contentDiv.innerHTML = htmlOutput;

            } catch (error) {
                contentDiv.innerHTML = `<div class="error">
                    <strong>Error:</strong> ${error.message}<br>
                    <small>Note: If this is a CORS error, the remote server is blocking direct access.</small>
                </div>`;
            }
        }

        loadSitemap();
    </script>
</body>
</html>
